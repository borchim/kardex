const { useMemo } = React;

function initials(name) {
  const parts = (name || '').trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return 'YN';
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

// Deterministic tiny QR-ish pattern for visual fidelity
function QRPattern({ size = 72, fg = '#0F1A2E', bg = '#fff' }) {
  const cells = 17;
  const pattern = useMemo(() => {
    const p = [];
    for (let y = 0; y < cells; y++) {
      for (let x = 0; x < cells; x++) {
        // finder squares in 3 corners
        const inFinder =
          (x < 7 && y < 7) ||
          (x >= cells - 7 && y < 7) ||
          (x < 7 && y >= cells - 7);
        if (inFinder) {
          const fx = x < 7 ? x : x - (cells - 7);
          const fy = y < 7 ? y : y - (cells - 7);
          const border = fx === 0 || fx === 6 || fy === 0 || fy === 6;
          const inner = fx >= 2 && fx <= 4 && fy >= 2 && fy <= 4;
          if (border || inner) p.push([x, y]);
        } else {
          // pseudo-random
          const v = (Math.sin(x * 12.9898 + y * 78.233) * 43758.5453) % 1;
          if (Math.abs(v) > 0.55) p.push([x, y]);
        }
      }
    }
    return p;
  }, []);
  const s = size / cells;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <rect width={size} height={size} fill={bg} />
      {pattern.map(([x, y], i) => (
        <rect key={i} x={x * s} y={y * s} width={s} height={s} fill={fg} />
      ))}
    </svg>
  );
}

}

function Card({ style = 'classic', name, title, company }) {

  if (style === 'bold') return <BoldCard {...props} />;
  if (style === 'photo') return <PhotoCard {...props} />;
  return <ClassicCard {...props} />;
}

function Button({ primary, children, onClick, dark, small }) {
  const base = {
    padding: small ? '10px 16px' : '14px 22px',
    borderRadius: 999,
    fontSize: small ? 13 : 14,
    fontWeight: 600,
    border: 'none',
    cursor: 'pointer',

    alignItems: 'center',
    gap: 8,
    transition: 'transform .15s ease, box-shadow .15s ease, background .15s ease',
    fontFamily: 'inherit',
  };
  const primaryStyle = {
    ...base,
    background: '#C9A24A',
    color: '#0F1A2E',
    boxShadow: '0 10px 24px -10px #C9A24A99',
  };
  const secondaryStyle = {
    ...base,
    background: dark ? 'transparent' : '#fff',
    color: dark ? '#F4EFE4' : '#0F1A2E',
    border: dark ? '1px solid #ffffff33' : '1px solid #0F1A2E22',
  };
  return (
    <button onClick={onClick} style={primary ? primaryStyle : secondaryStyle}
      onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-1px)'; }}
      onMouseLeave={e => { e.currentTarget.style.transform = 'translateY(0)'; }}
    >
      {children}
    </button>
  );
}

<script type="text/babel">
  const { useState, useEffect } = React;

  function mount() {
    if (!window.Nav || !window.Card) { return setTimeout(mount, 30); }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  }

  function App() {
    const [form, setForm] = useState({ name: '', title: '', company: '' });
    const [cardStyle, setCardStyle] = useState(window.TWEAK_DEFAULTS?.cardStyle || 'classic');

    // Tweaks protocol — listener FIRST, then announce
    useEffect(() => {
      const panel = document.getElementById('tweaks');
      function onMsg(e) {
        if (!e.data) return;
        if (e.data.type === '__activate_edit_mode') panel.classList.add('visible');
        if (e.data.type === '__deactivate_edit_mode') panel.classList.remove('visible');
      }
      window.addEventListener('message', onMsg);
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');

      // Wire up style buttons
      const row = document.getElementById('styleRow');
      function update() {
        row.querySelectorAll('button').forEach(b => {
          b.classList.toggle('active', b.dataset.style === cardStyle);
        });
      }
      update();
      row.onclick = (e) => {
        const b = e.target.closest('button');
        if (!b) return;
        setCardStyle(b.dataset.style);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { cardStyle: b.dataset.style } }, '*');
      };

      return () => window.removeEventListener('message', onMsg);
    }, [cardStyle]);

    return (
      <div>
        <Nav />
        <Hero form={form} setForm={setForm} cardStyle={cardStyle} setCardStyle={setCardStyle} />
        <LogoBar />
        <HowItWorks />
        <Features />
        <Comparison />
